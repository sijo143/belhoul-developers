<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belhoul Developers - Coming Soon</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts for ultra luxury serif (Cinzel) and clean tracking (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;600&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for minimal subtle interactive icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: {
                            light: '#f4ebdb',
                            brand: '#c5a059', // Classic desert gold tone
                            dark: '#874b27'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        serif: ['Cinzel', 'Georgia', 'serif']
                    }
                }
            }
        }
    </script>

    <style>
        /* Hide scrollbars for absolute immersion */
        body {
            overflow: hidden;
            background-color: #050504;
        }

        /* Ambient smooth fade-in animations */
        .fade-in-delayed {
            animation: fadeIn 3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            opacity: 0;
        }

        .fade-in-logo {
            animation: fadeIn 2s cubic-bezier(0.25, 1, 0.5, 1) 0.5s forwards;
            opacity: 0;
        }

        .fade-in-title {
            animation: fadeIn 2.5s cubic-bezier(0.25, 1, 0.5, 1) 1s forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
                filter: blur(5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        /* Gold gradient text styling representing metallic light reflection */
        .text-gold-luxury {
            background: linear-gradient(135deg, #ffffff 0%, #f4ebdb 30%, #c5a059 75%, #a88444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(197, 160, 89, 0.15);
        }

        /* Premium slow zoom & drift on background image */
        .ambient-zoom {
            animation: slowPan 60s infinite alternate ease-in-out;
        }

        @keyframes slowPan {
            0% {
                transform: scale(1.05) translate(0px, 0px);
            }
            100% {
                transform: scale(1.15) translate(-1% , -1%);
            }
        }

        /* Glass audio controls */
        .glass-btn {
            background: rgba(15, 14, 10, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(197, 160, 89, 0.12);
        }
    </style>
</head>
<body class="h-full text-gray-100 font-sans selection:bg-gold-brand selection:text-black antialiased">

    <!-- Full Screen Background Image with subtle cinematic zoom and heavy dark vignette -->
    <div class="fixed inset-0 z-0 overflow-hidden">
        <div id="bgImage" class="absolute inset-0 bg-cover bg-center ambient-zoom transition-transform duration-1000 ease-out" 
             style="background-image: url('BG.jpg');"></div>
        <!-- Ultra dark luxurious overlays to prioritize the text legibility and minimal look -->
        <div class="absolute inset-0 bg-gradient-to-t from-[#050504] via-[#050504]/95 to-[#050504]/90"></div>
        <div class="absolute inset-0 bg-black/40"></div>
        <!-- Ambient radial soft gold glow centered behind the screen text -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] rounded-full bg-gold-brand/5 blur-[140px] pointer-events-none"></div>
    </div>

    <!-- Elegant HTML5 Canvas for golden dust floating engine -->
    <canvas id="particleCanvas" class="fixed inset-0 z-10 pointer-events-none"></canvas>

    <!-- Main Content Container spanning the viewport height -->
    <div class="relative z-20 min-h-screen flex flex-col justify-between items-center px-6 py-12 md:py-16">
        
        <!-- Header: Minimal brand trademark featuring Logo_2.png -->
        <header class="w-full flex justify-center items-center mt-4">
            <div class="fade-in-logo">
                <img src="Logo_2.png" alt="Belhoul Developers Logo" class="h-12 sm:h-14 w-auto object-contain drop-shadow-[0_4px_12px_rgba(0,0,0,0.8)] transition-all duration-700 hover:scale-105" onerror="this.onerror=null; this.src='Logo.png';">
            </div>
        </header>

        <!-- Center: Hero text styled for ultimate luxury and space -->
        <main class="flex-grow flex flex-col justify-center items-center text-center px-4 max-w-4xl">
            <!-- English elegant text -->
            <h1 class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-serif font-light tracking-[0.45em] sm:tracking-[0.6em] text-gold-luxury select-none uppercase fade-in-title pr-[-0.6em]">
                Coming Soon
            </h1>
        </main>

        <!-- Footer: Quiet audio toggle and very subtle copyright -->
        <footer class="w-full max-w-6xl flex flex-col sm:flex-row justify-between items-center gap-6 text-xs text-gray-500 font-light border-t border-gold-brand/5 pt-8">
            <!-- Left side: Soft Sound Toggle -->
            <div>
                <button id="soundToggleBtn" onclick="toggleLuxuryAudio()" class="px-5 py-2 rounded-full glass-btn text-gold-brand hover:text-white transition-all duration-500 flex items-center gap-2.5 text-[11px] tracking-[0.15em] uppercase fade-in-delayed" title="Ambient Experience Controller">
                    <i id="soundIcon" class="fa-solid fa-volume-xmark opacity-70"></i>
                    <span id="soundText">Sound Off</span>
                </button>
            </div>

            <!-- Right side: Clean minimal copyright statement -->
            <div class="fade-in-delayed tracking-widest text-[10px] text-gray-600 uppercase">
                &copy; 2026 Belhoul Developers. All rights reserved.
            </div>
        </footer>
    </div>

    <script>
        // Interactive luxury audio synthesis using Native Web Audio API
        let audioContext = null;
        let warmDrone = null;
        let crystalOsc = null;
        let lowpassFilter = null;
        let volumeGain = null;
        let soundIsActive = false;

        function startLuxurySound() {
            try {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                audioContext = new AudioContextClass();

                // Low warm drone synthesizer representing stability and premium environment
                warmDrone = audioContext.createOscillator();
                warmDrone.type = 'sine';
                warmDrone.frequency.value = 55; // Grounding frequency (A1)

                // High crystalline soft pulse mimicking pure star energy
                crystalOsc = audioContext.createOscillator();
                crystalOsc.type = 'triangle';
                crystalOsc.frequency.value = 110; // Harmonic wave

                // Soft lowpass filter to remove harshness and create a dark luxury drone
                lowpassFilter = audioContext.createBiquadFilter();
                lowpassFilter.type = 'lowpass';
                lowpassFilter.frequency.value = 130;
                lowpassFilter.Q.value = 1.2;

                // Subtle slow volume oscillator (LFO) to make the drone breathe like a calm sea
                let breathLFO = audioContext.createOscillator();
                let breathGain = audioContext.createGain();
                breathLFO.frequency.value = 0.12; // Complete cycle every 8 seconds
                breathGain.gain.value = 35; // swing amount

                breathLFO.connect(breathGain);
                breathGain.connect(lowpassFilter.frequency);

                // Master gain node
                volumeGain = audioContext.createGain();
                volumeGain.gain.setValueAtTime(0, audioContext.currentTime);

                // Connections
                warmDrone.connect(lowpassFilter);
                crystalOsc.connect(lowpassFilter);
                lowpassFilter.connect(volumeGain);
                volumeGain.connect(audioContext.destination);

                // Start sources
                warmDrone.start();
                crystalOsc.start();
                breathLFO.start();
            } catch (error) {
                console.warn("High fidelity sound skipped: blocked by browser policy.");
            }
        }

        function toggleLuxuryAudio() {
            if (!audioContext) {
                startLuxurySound();
            }

            const iconElement = document.getElementById('soundIcon');
            const textElement = document.getElementById('soundText');

            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }

            if (!soundIsActive) {
                // Smoothly fade in volume to protect user experience (luxury curve)
                if (volumeGain) {
                    volumeGain.gain.linearRampToValueAtTime(0.25, audioContext.currentTime + 3);
                }
                iconElement.className = 'fa-solid fa-volume-high text-gold-brand animate-pulse';
                textElement.innerText = 'Sound On';
                soundIsActive = true;
            } else {
                // Smoothly fade out volume
                if (volumeGain) {
                    volumeGain.gain.linearRampToValueAtTime(0, audioContext.currentTime + 1.5);
                }
                iconElement.className = 'fa-solid fa-volume-xmark opacity-70';
                textElement.innerText = 'Sound Off';
                soundIsActive = false;
            }
        }

        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const maxParticles = 60; // Minimal density for premium spacing
        let cursorPosition = { x: null, y: null, targetRadius: 150 };

        // Handle dynamically updating canvas dimensions safely on resize
        function fitToScreen() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', fitToScreen);
        fitToScreen();

        // Parallax depth effect on the skyline image relative to mouse coordinates
        window.addEventListener('mousemove', function(e) {
            cursorPosition.x = e.clientX;
            cursorPosition.y = e.clientY;

            // Soft luxury parallax on the background image
            const bgImg = document.getElementById('bgImage');
            const dx = (e.clientX - window.innerWidth / 2) * 0.01;
            const dy = (e.clientY - window.innerHeight / 2) * 0.01;
            bgImg.style.transform = `scale(1.08) translate(${dx}px, ${dy}px)`;
        });

        window.addEventListener('mouseleave', function() {
            cursorPosition.x = null;
            cursorPosition.y = null;
            const bgImg = document.getElementById('bgImage');
            bgImg.style.transform = `scale(1.08) translate(0px, 0px)`;
        });

        // Trigger gorgeous soft bursts of shimmering gold dust when clicking
        window.addEventListener('click', function(e) {
            for (let i = 0; i < 12; i++) {
                particles.push(new GoldSpeck(e.clientX, e.clientY, true));
            }
        });

        // Speck blueprint
        class GoldSpeck {
            constructor(x = null, y = null, isSpark = false) {
                this.x = x !== null ? x : Math.random() * canvas.width;
                this.y = y !== null ? y : Math.random() * canvas.height;
                
                // Very delicate scales: 0.3px to 1.8px
                this.size = Math.random() * 1.5 + 0.3;
                
                if (isSpark) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 2 + 0.5;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.life = 1.0; // Decay timer
                } else {
                    this.vx = Math.random() * 0.2 - 0.1;
                    this.vy = -(Math.random() * 0.4 + 0.1); // Graceful rising flow
                    this.life = Math.random() * 0.5 + 0.5;
                }

                // Premium luxury gold tones
                const shades = [
                    'rgba(197, 160, 89, ', // Brand Gold
                    'rgba(244, 235, 219, ', // Warm Alabaster
                    'rgba(218, 185, 140, '  // Desert Sand
                ];
                this.colorBase = shades[Math.floor(Math.random() * shades.length)];
                this.isSpark = isSpark;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.colorBase + this.life + ')';
                ctx.fill();
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Subtle repulsion force near the user's cursor
                if (cursorPosition.x !== null && cursorPosition.y !== null) {
                    let dx = this.x - cursorPosition.x;
                    let dy = this.y - cursorPosition.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < cursorPosition.targetRadius) {
                        let force = (cursorPosition.targetRadius - dist) / cursorPosition.targetRadius;
                        let pushX = (dx / dist) * force * 1.2;
                        let pushY = (dy / dist) * force * 1.2;
                        this.x += pushX;
                        this.y += pushY;
                    }
                }

                // Fade away click sparkles or recycled background dust
                if (this.isSpark) {
                    this.life -= 0.015;
                } else {
                    // Randomly twinkle the ambient specks
                    this.life += (Math.random() * 0.04 - 0.02);
                    if (this.life > 0.8) this.life = 0.8;
                    if (this.life < 0.15) this.life = 0.15;
                }

                // Boundary/decay recycling
                if (this.y < -10 || this.x < -10 || this.x > canvas.width + 10 || this.life <= 0) {
                    this.x = Math.random() * canvas.width;
                    this.y = canvas.height + 10;
                    this.vy = -(Math.random() * 0.4 + 0.1);
                    this.vx = Math.random() * 0.2 - 0.1;
                    this.life = Math.random() * 0.5 + 0.3;
                    this.isSpark = false;
                }
            }
        }

        // Initialize particles
        function buildEngine() {
            particles = [];
            for (let i = 0; i < maxParticles; i++) {
                particles.push(new GoldSpeck());
            }
        }

        // Loop engine frames
        function engineLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            // Clean up decayed spark entities
            particles = particles.filter(p => !p.isSpark || p.life > 0);
            requestAnimationFrame(engineLoop);
        }

        // Trigger on load
        window.onload = function() {
            buildEngine();
            engineLoop();
        };
    </script>
</body>
</html>
